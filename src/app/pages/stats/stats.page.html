<ion-header>
  <ion-toolbar color="dark">
    <ion-title>Statistics</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <div *ngIf="isLoading" class="ion-text-center ion-padding">
    <ion-spinner></ion-spinner>
  </div>

  <div *ngIf="!isLoading">

    <h2>Top 6 Genres</h2>
    <div class="chart-container">
      <canvas id="genreChart"></canvas>
    </div>

    <h2>Most Watched Movies</h2>
    <div class="chart-container">
      <canvas id="watchCountChart"></canvas>
    </div>

    <h2>Watched Movies Table</h2>
    <table mat-table [dataSource]="dataSource" matSort class="mat-table">

      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Title</th>
        <td mat-cell *matCellDef="let movie">{{ movie.title }}</td>
      </ng-container>

      <ng-container matColumnDef="genre">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Genre</th>
        <td mat-cell *matCellDef="let movie">{{ movie.genre }}</td>
      </ng-container>

      <ng-container matColumnDef="year">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Year</th>
        <td mat-cell *matCellDef="let movie">{{ movie.year }}</td>
      </ng-container>

      <ng-container matColumnDef="timesWatched">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Times Watched</th>
        <td mat-cell *matCellDef="let movie">{{ movie.timesWatched }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="tableColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: tableColumns;"></tr>

    </table>
    <mat-paginator [pageSize]="5"></mat-paginator>

  </div>

</ion-content>
