<ion-header>
  <ion-toolbar color="dark">
    <ion-title>My Watchlist</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <div *ngIf="isLoading" class="ion-text-center ion-padding">
    <ion-spinner></ion-spinner>
  </div>

  <div *ngIf="!isLoading && watchlistMovies.length === 0"
       class="ion-text-center ion-padding">
    <p>Your watchlist is empty. Search for movies to add!</p>
  </div>

  <ion-list *ngIf="!isLoading && watchlistMovies.length > 0">
    <ion-item *ngFor="let movie of watchlistMovies">
      <ion-thumbnail slot="start">
        <ion-img [src]="movie.poster"></ion-img>
      </ion-thumbnail>
      <ion-label>
        <h2>{{ movie.title }}</h2>
        <p>{{ movie.year }} • {{ movie.genre }}</p>
        <p>{{ movie.director }}</p>
      </ion-label>
      <ion-button slot="end" color="success"
                  (click)="moveToWatched(movie)">
        Watched
      </ion-button>
      <ion-button slot="end" color="danger"
                  (click)="removeMovie(movie.title)">
        Remove
      </ion-button>
    </ion-item>
  </ion-list>

</ion-content>
